name: Live Source Audit

on:
  schedule:
    - cron: '40 1 * * 1-5' # 平日日本時間10:40
    - cron: '40 4 * * 1-5' # 平日日本時間13:40
    - cron: '40 6 * * 1-5' # 平日日本時間15:40
  workflow_dispatch:
    inputs:
      municipalities:
        description: '監査する自治体。空欄なら奈良県を除く全自治体。カンマ区切り例: 五條市,葛城市'
        required: false
        default: ''
      allow_scraper_errors:
        description: 'スクレイパーエラーがあっても差分レポートだけ残す'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: naramania-live-source-audit
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  audit-live-sources:
    runs-on: ubuntu-latest
    env:
      LIVE_AUDIT_ONLY_MUNICIPALITIES: ${{ github.event.inputs.municipalities || '' }}
      LIVE_AUDIT_EXCEPT_MUNICIPALITIES: ${{ github.event.inputs.municipalities && '' || '奈良県' }}
      LIVE_AUDIT_ALLOW_SCRAPER_ERRORS: ${{ github.event.inputs.allow_scraper_errors == 'true' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Validate AI Models
        run: npm run validate:ai-models
        env:
          NODE_ENV: production

      - name: Run live source audit
        id: audit
        continue-on-error: true
        run: npm run audit:live-sources
        env:
          NODE_ENV: production

      - name: Validate Practical Filters
        run: npm run validate:filters
        env:
          NODE_ENV: production

      # チャット回答はコードの回帰テストであって監査の関所ではない。
      # ここで落ちてもレポートのcommitや監査結果の成否判定は止めない。
      - name: Validate Chat Answers
        run: npm run validate:chat
        continue-on-error: true
        env:
          NODE_ENV: production

      - name: Commit live audit report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add live_source_audit_report.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: live source audit report [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Fail if live audit failed
        if: steps.audit.outcome == 'failure'
        run: exit 1
