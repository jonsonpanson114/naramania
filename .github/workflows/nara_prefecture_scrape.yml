name: Nara Prefecture Scrape

on:
  schedule:
    - cron: '5 1 * * 1-5' # 平日日本時間10:05
    - cron: '5 4 * * 1-5' # 平日日本時間13:05
    - cron: '5 6 * * 1-5' # 平日日本時間15:05
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-nara-prefecture:
    runs-on: [self-hosted, windows, x64]
    env:
      SCRAPE_ONLY_MUNICIPALITIES: 奈良県
      QUALITY_GUARDED_MUNICIPALITIES: 奈良県
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Run Nara Prefecture Scraper
        run: npm run scrape
        env:
          NODE_ENV: production

      - name: Validate Nara Prefecture Quality
        run: npm run validate:quality
        env:
          NODE_ENV: production

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper_result.json scraper_quality.json municipality_snapshots.json
          if (-not (git diff --cached --quiet; $LASTEXITCODE -eq 0)) {
            git commit -m "chore: nara prefecture data update [skip ci]"
            git pull --rebase origin main
            git push origin main
          }
