name: Nara Prefecture Scrape

on:
  # 奈良県PPIはself-hosted Windows runnerが必要です。
  # 【前提】schedule実行時にrunnerがオンラインである必要があります。
  # runnerがオフラインのままだと各run最大24hほど queued のまま cancelled になり、
  # 履歴にノイズが溜まります(過去にこの理由でscheduleを一時撤去)。
  # runnerを常設できない期間は schedule をコメントアウトし workflow_dispatch のみに戻すこと。
  schedule:
    - cron: '0 13 * * 1-5' # 平日日本時間22:00
  workflow_dispatch:

concurrency:
  group: naramania-nara-prefecture-scrape
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scrape-nara-prefecture:
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 240
    env:
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      SCRAPE_ONLY_MUNICIPALITIES: 奈良県
      QUALITY_GUARDED_MUNICIPALITIES: 奈良県
      QUALITY_REQUIRE_NARA_PREF_WINNERS: "1"
      NARA_PREF_RESULT_LOOKBACK_DAYS: "370"
      NARA_PREF_DETAIL_FETCH_LIMIT: "150"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Validate AI Models
        run: npm run validate:ai-models
        env:
          NODE_ENV: production

      - name: Run Nara Prefecture Scraper
        run: npm run scrape
        env:
          NODE_ENV: production

      - name: Run AI Augmentation
        if: ${{ env.GOOGLE_GENERATIVE_AI_API_KEY != '' }}
        run: npm run augment:intelligence
        env:
          NODE_ENV: production

      - name: Validate Nara Prefecture Quality
        run: npm run validate:quality
        env:
          NODE_ENV: production

      - name: Validate Practical Filters
        run: npm run validate:filters
        env:
          NODE_ENV: production

      - name: Validate Snapshot Coverage
        run: npm run validate:snapshots
        env:
          NODE_ENV: production

      # チャット回答はコードの回帰テストであってデータ配信の関所ではない。
      # ここで落ちても最新データのcommitは止めない（失敗はログに警告として残る）。
      - name: Validate Chat Answers
        run: npm run validate:chat
        continue-on-error: true
        env:
          NODE_ENV: production

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper_result.json scraper_quality.json municipality_snapshots.json quality_watch_report.json snapshot_coverage_report.json opening_result_updates.json
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: nara prefecture data update [skip ci]"
            git pull --rebase --autostash origin main
            git push origin main
          }
