name: Nara Prefecture Scrape

on:
  # 奈良県PPIはself-hosted Windows runnerが必要です。
  # runnerがオフラインのままscheduleすると queued/cancelled が溜まるため、
  # runner起動後に手動実行します。
  workflow_dispatch:

concurrency:
  group: naramania-nara-prefecture-scrape
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scrape-nara-prefecture:
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 240
    env:
      SCRAPE_ONLY_MUNICIPALITIES: 奈良県
      QUALITY_GUARDED_MUNICIPALITIES: 奈良県
      QUALITY_REQUIRE_NARA_PREF_WINNERS: "1"
      NARA_PREF_RESULT_LOOKBACK_DAYS: "370"
      NARA_PREF_DETAIL_FETCH_LIMIT: "150"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Validate AI Models
        run: npm run validate:ai-models
        env:
          NODE_ENV: production

      - name: Run Nara Prefecture Scraper
        run: npm run scrape
        env:
          NODE_ENV: production

      - name: Validate Nara Prefecture Quality
        run: npm run validate:quality
        env:
          NODE_ENV: production

      - name: Validate Practical Filters
        run: npm run validate:filters
        env:
          NODE_ENV: production

      - name: Validate Snapshot Coverage
        run: npm run validate:snapshots
        env:
          NODE_ENV: production

      - name: Validate Chat Answers
        run: npm run validate:chat
        env:
          NODE_ENV: production

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper_result.json scraper_quality.json municipality_snapshots.json quality_watch_report.json snapshot_coverage_report.json
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: nara prefecture data update [skip ci]"
            git pull --rebase origin main
            git push origin main
          }
