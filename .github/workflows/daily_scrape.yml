name: Daily Scrape

on:
  schedule:
    - cron: '0 1 * * 1-5' # 平日日本時間10:00 (UTC 1:00)
    - cron: '0 4 * * 1-5' # 平日日本時間13:00 (UTC 4:00)
    - cron: '0 6 * * 1-5' # 平日日本時間15:00 (UTC 6:00)
  workflow_dispatch: # 手動実行用

concurrency:
  group: naramania-data-publish
  cancel-in-progress: false

permissions:
  contents: write


jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      SCRAPE_EXCEPT_MUNICIPALITIES: 奈良県
      QUALITY_GUARDED_MUNICIPALITIES: ""
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Scraper
        run: npm run scrape
        env:
          NODE_ENV: production

      - name: Validate Quality
        run: npm run validate:quality
        env:
          NODE_ENV: production

      - name: Run AI Augmentation
        if: ${{ env.GOOGLE_GENERATIVE_AI_API_KEY != '' }}
        run: npm run augment:intelligence
        env:
          NODE_ENV: production

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper_result.json scraper_quality.json municipality_snapshots.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily data update [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
