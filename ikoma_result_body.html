	<script language="javascript">
	var perPage = parseInt(document.forms[0].perPage.value);
	var curPage = parseInt(document.forms[0].curPage.value);
	var recCount = parseInt(document.forms[0].recCount.value);
	var pageCount = Math.ceil(recCount / perPage);
	
	if (! isNaN(recCount)){
		document.write("検索結果一覧：");
		document.write(recCount);
		document.write("件のうち");
		if(recCount =="0"){
			document.write("0");
		}else{
			document.write((curPage - 1) * perPage + 1);
		}
		document.write("－");
		if((curPage * perPage) > recCount){
			document.write(recCount);
		}else{
			document.write(curPage * perPage);
		}
		document.write("件を表示");		
		document.write("</td><td align='right'>");
        //
        //
        document.write("（全" + pageCount + "ページ）");
        //
		if(recCount!="0" && curPage !="1"){
			document.write("&nbsp;&nbsp;<a href='../do/KK401SearchAction?page="+ (curPage -1) +"'><<前へ</a>");		
		}
        //
        //
        if (recCount != "0" && pageCount != "1") {
            document.write("&nbsp;&nbsp;<input type='text' id='pageInput' style='text-align: right;' value='" + curPage + "' size='4'>");
            document.write("ページ目");
            document.write("<input type='button' value='表示' size='40' onClick='pageJump();' class='CystageBtn'/>");
        }
        //
		if(recCount!="0" && curPage != pageCount){
			document.write("&nbsp;&nbsp;<a href='../do/KK401SearchAction?page="+ (curPage +1) +"'>次へ>></a>");
		}
	}
    //
    //
    function pageJump() {
        var pageInput = document.getElementById("pageInput").value;
        var pagePattern = /^[1-9][0-9]*$/g
        pagePattern.compile(pagePattern);
        if (pagePattern.test(pageInput) && parseInt(pageInput, 10) <= pageCount) {
            window.open("../do/KK401SearchAction?page=" + pageInput, "_self");
        } else {
            alert("指定されたページ数が不正です。");
        }
    }
    //
	</script>
